name: Build Electron Client

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      versioned_tag: ${{ steps.release_info.outputs.versioned_tag }}
      versioned_name: ${{ steps.release_info.outputs.versioned_name }}
      latest_tag: latest-build
      latest_name: latest-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read release info
        id: release_info
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "versioned_tag=v${version}-build.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "versioned_name=v${version}-build.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create versioned release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.release_info.outputs.versioned_tag }}
          name: ${{ steps.release_info.outputs.versioned_name }}
          commit: ${{ github.sha }}
          allowUpdates: true
          generateReleaseNotes: true
          prerelease: true

      - name: Create rolling latest release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-build
          name: latest-build
          commit: ${{ github.sha }}
          body: Latest auto build from ${{ github.sha }}
          allowUpdates: true
          prerelease: true

  build:
    name: Build ${{ matrix.target_name }}
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: win-x64
            runner: windows-latest
            build_script: build-client:win-x64
            artifact_pattern: '*.exe'
            release_file: data-in-png-win-x64.exe
          - target_name: linux-x64
            runner: ubuntu-latest
            build_script: build-client:linux-x64
            artifact_pattern: '*.AppImage'
            release_file: data-in-png-linux-x64.AppImage
          - target_name: linux-arm64
            runner: ubuntu-24.04-arm
            build_script: build-client:linux-arm64
            artifact_pattern: '*.AppImage'
            release_file: data-in-png-linux-arm64.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Ensure app-builder is executable (Linux)
        if: runner.os == 'Linux'
        run: chmod +x node_modules/app-builder-bin/linux/*/app-builder || true

      - name: Build
        run: npm run ${{ matrix.build_script }}

      - name: Collect release asset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $files = @(Get-ChildItem -Path dist -Recurse -File | Where-Object { $_.Name -like "${{ matrix.artifact_pattern }}" -and $_.DirectoryName -notmatch "unpacked" })
          if ($files.Count -eq 0) {
            throw "No build artifact found for ${{ matrix.target_name }}"
          }
          $file = $files | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          Copy-Item -Path $file.FullName -Destination "release-assets/${{ matrix.release_file }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target_name }}
          path: release-assets/${{ matrix.release_file }}
          if-no-files-found: error

      - name: Publish versioned release asset
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare-release.outputs.versioned_tag }}
          artifacts: release-assets/${{ matrix.release_file }}
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          prerelease: true

      - name: Publish rolling latest release asset
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.prepare-release.outputs.latest_tag }}
          artifacts: release-assets/${{ matrix.release_file }}
          artifactErrorsFailBuild: true
          allowUpdates: true
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          prerelease: true