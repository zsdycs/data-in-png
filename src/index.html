<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片转换</title>
  <style>
    :root {
      --primary:      #4f6bed;
      --primary-h:    #3d58d8;
      --bg:           #f1f5f9;
      --card:         #ffffff;
      --border:       #e2e8f0;
      --text:         #1e293b;
      --muted:        #94a3b8;
      --s-bg:  #ecfdf5; --s-t: #065f46;
      --e-bg:  #fff1f2; --e-t: #9f1239;
      --i-bg:  #eff6ff; --i-t: #1e40af;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                   'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      color: var(--text);
      min-height: 100vh;
      padding: 36px 16px;
    }
    .wrap { max-width: 580px; margin: 0 auto; }

    /* ── header ── */
    .hd { text-align: center; margin-bottom: 28px; }
    .hd h1 { font-size: 22px; font-weight: 700; color: var(--primary); letter-spacing: .4px; }
    .hd p  { margin-top: 6px; font-size: 13px; color: var(--muted); }

    /* ── card ── */
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 6px 20px rgba(0,0,0,.07);
    }

    /* ── textarea ── */
    textarea {
      width: 100%; height: 150px;
      padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; line-height: 1.65; font-family: inherit;
      color: var(--text); resize: vertical; outline: none;
      transition: border-color .2s;
    }
    textarea:focus { border-color: var(--primary); }

    /* ── actions ── */
    .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .btn {
      padding: 9px 20px;
      border: none; border-radius: 8px;
      font-size: 13.5px; font-weight: 600; cursor: pointer;
      font-family: inherit;
      transition: background .16s, opacity .16s, transform .08s;
      white-space: nowrap; user-select: none;
    }
    .btn:active:not(:disabled) { transform: scale(.96); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-h); }
    .btn-outline {
      background: #f8fafc; color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-outline:hover:not(:disabled) { background: var(--border); }
    .btn:disabled { opacity: .42; cursor: not-allowed; }

    /* file label mimics .btn-outline */
    .upload-lbl {
      display: inline-block;
      padding: 9px 20px;
      border-radius: 8px;
      font-size: 13.5px; font-weight: 600; cursor: pointer;
      font-family: inherit;
      background: #f8fafc; color: var(--text);
      border: 1.5px solid var(--border);
      transition: background .16s;
      white-space: nowrap; user-select: none;
    }
    .upload-lbl:hover { background: var(--border); }
    .upload-lbl:active { transform: scale(.96); }

    /* ── message area ── */
    #msg {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px; line-height: 1.55;
    }
    #msg.success { display:block; background:var(--s-bg); color:var(--s-t); }
    #msg.error   { display:block; background:var(--e-bg); color:var(--e-t); }
    #msg.info    { display:block; background:var(--i-bg); color:var(--i-t); }

    .prog {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f8fafc;
    }
    .prog-row + .prog-row { margin-top: 10px; }
    .prog-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text);
      margin-bottom: 6px;
    }
    .prog-track {
      height: 8px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }
    .prog-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #4f6bed, #3d58d8);
      transition: width .2s ease;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <!-- <h1>图片隐写术</h1> -->
    <!-- <p>利用 LSB 像素隐写，将文本秘密编入 PNG 图片，或从图片中还原文本</p> -->
  </div>

  <div class="card">
    <textarea id="txt" placeholder="在此输入文本内容…"></textarea>

    <div class="actions">
      <button class="btn btn-primary" id="btn-gen">生成</button>
      <label class="upload-lbl">
        上传图片
        <input type="file" id="file-inp" accept="image/png" multiple style="display:none" />
      </label>
      <label class="upload-lbl">
        上传文件
        <input type="file" id="file-b64-inp" style="display:none" />
      </label>
    </div>

    <div id="msg"></div>

    <div class="prog" id="prog" style="display:none">
      <div class="prog-row">
        <div class="prog-top">
          <span>上传进度</span>
          <span id="prog-up-txt">0%</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="prog-up"></div></div>
      </div>
      <div class="prog-row">
        <div class="prog-top">
          <span>分片处理</span>
          <span id="prog-proc-txt">0%</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="prog-proc"></div></div>
      </div>
      <div class="prog-row">
        <div class="prog-top">
          <span>下载进度</span>
          <span id="prog-dl-txt">0%</span>
        </div>
        <div class="prog-track"><div class="prog-fill" id="prog-dl"></div></div>
      </div>
    </div>

  </div>
</div>

<script>
'use strict';

const DEFAULT_CONFIG = {
  ...(window.__APP_CONFIG__ || {}),
  PREVIEW_CHARS: Number(window.__APP_CONFIG__?.PREVIEW_CHARS) || 20,
  CHUNK_SIZE_BYTES: Number(window.__APP_CONFIG__?.CHUNK_SIZE_BYTES) || (2 * 1024 * 1024),
  DOWNLOAD_BATCH_SIZE: Number(window.__APP_CONFIG__?.DOWNLOAD_BATCH_SIZE ?? 3),
  MAX_UPLOAD_BYTES: Number(window.__APP_CONFIG__?.MAX_UPLOAD_BYTES) || (300 * 1024 * 1024)
};

let APP_CONFIG = { ...DEFAULT_CONFIG };

const txtEl = document.getElementById('txt');
const btnGen = document.getElementById('btn-gen');
const fileInp = document.getElementById('file-inp');
const fileB64Inp = document.getElementById('file-b64-inp');
const msgEl = document.getElementById('msg');
const progEl = document.getElementById('prog');
const progUpEl = document.getElementById('prog-up');
const progProcEl = document.getElementById('prog-proc');
const progDlEl = document.getElementById('prog-dl');
const progUpTxtEl = document.getElementById('prog-up-txt');
const progProcTxtEl = document.getElementById('prog-proc-txt');
const progDlTxtEl = document.getElementById('prog-dl-txt');

function showMsg(text, type) {
  msgEl.textContent = text;
  msgEl.className = type;
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function clampPct(value) {
  const n = Number(value);
  if (!Number.isFinite(n)) return 0;
  return Math.max(0, Math.min(100, n));
}

function setProgressVisible(show) {
  progEl.style.display = show ? 'block' : 'none';
}

function setStageProgress(stage, value, text) {
  const pct = clampPct(value);
  const label = text || (pct.toFixed(0) + '%');
  if (stage === 'upload') {
    progUpEl.style.width = pct + '%';
    progUpTxtEl.textContent = label;
    return;
  }
  if (stage === 'process') {
    progProcEl.style.width = pct + '%';
    progProcTxtEl.textContent = label;
    return;
  }
  if (stage === 'download') {
    progDlEl.style.width = pct + '%';
    progDlTxtEl.textContent = label;
  }
}

function resetProgress() {
  setStageProgress('upload', 0, '0%');
  setStageProgress('process', 0, '0%');
  setStageProgress('download', 0, '0%');
}

function startProcessingTicker() {
  let p = 8;
  setStageProgress('process', p, '处理中...');
  const timer = setInterval(() => {
    p = Math.min(92, p + Math.random() * 4);
    setStageProgress('process', p, '处理中...');
  }, 280);
  return () => {
    clearInterval(timer);
    setStageProgress('process', 100, '100%');
  };
}

function createTaskId() {
  return 't' + Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
}

function openProgressSse(taskId, onMessage) {
  const es = new EventSource('/api/progress/' + encodeURIComponent(taskId));
  es.onmessage = (ev) => {
    if (!ev || !ev.data) return;
    try {
      const data = JSON.parse(ev.data);
      if (typeof onMessage === 'function') onMessage(data);
    } catch (_e) {
      /* ignore malformed event payload */
    }
  };
  return es;
}

function safeFileName(name) {
  const src = String(name || '').trim();
  const cleaned = src.replace(/[<>:"/\\|?*\x00-\x1F]/g, '_').replace(/\s+/g, ' ').trim();
  return cleaned || 'file';
}

function formatBytesAsMb(bytes) {
  return (Number(bytes) / 1024 / 1024).toFixed(0);
}

function utf8ToBase64(str) {
  const bytes = new TextEncoder().encode(String(str || ''));
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

function postArrayBufferWithUploadProgress(url, headers, body, onUploadProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', url, true);
    Object.entries(headers || {}).forEach(([k, v]) => xhr.setRequestHeader(k, v));

    xhr.upload.onprogress = (ev) => {
      if (ev.lengthComputable && typeof onUploadProgress === 'function') {
        onUploadProgress((ev.loaded / ev.total) * 100, ev.loaded, ev.total);
      }
    };

    xhr.onerror = () => reject(new Error('网络错误，请检查连接后重试'));
    xhr.onabort = () => reject(new Error('请求已取消'));
    xhr.onload = () => {
      const text = xhr.responseText || '';
      let data = {};
      try {
        data = text ? JSON.parse(text) : {};
      } catch (_e) {
        data = { error: '服务端返回了非 JSON 响应' };
      }
      if (xhr.status >= 200 && xhr.status < 300) {
        resolve(data);
      } else {
        const errMsg = (data && (data.detail || data.error)) || ('HTTP ' + xhr.status);
        const err = new Error(errMsg);
        err.code = data && data.code;
        err.maxBytes = data && data.maxBytes;
        reject(err);
      }
    };

    xhr.send(body);
  });
}

function triggerDownload(url, fileName) {
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    if (a.parentNode) a.parentNode.removeChild(a);
  }, 200);
}

function triggerBlobDownload(blob, fileName) {
  const url = URL.createObjectURL(blob);
  triggerDownload(url, fileName);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

async function parseJsonSafe(resp) {
  const text = await resp.text();
  if (!text) return {};
  try {
    return JSON.parse(text);
  } catch (_e) {
    return { error: '服务端返回了非 JSON 响应' };
  }
}

async function fetchConfig() {
  const resp = await fetch('/api/config');
  const data = await parseJsonSafe(resp);
  if (!resp.ok) throw new Error(data.error || ('HTTP ' + resp.status));
  APP_CONFIG = { ...DEFAULT_CONFIG, ...data };
}

async function downloadFilesInBatches(files, batchSize) {
  const rawBatchSize = Number(batchSize);
  const noThrottle = rawBatchSize === 0;
  const size = noThrottle ? Math.max(1, files.length) : Math.max(1, Math.floor(rawBatchSize) || 1);
  const itemDelay = noThrottle ? 80 : 120;
  const batchDelay = noThrottle ? 80 : 320;
  let done = 0;
  const total = files.length || 1;
  for (let i = 0; i < files.length; i += size) {
    const group = files.slice(i, i + size);
    for (let j = 0; j < group.length; j++) {
      const f = group[j];
      triggerDownload(f.url, f.name);
      done += 1;
      setStageProgress('download', (done / total) * 100, `${done}/${total}`);
      const needItemDelay = group.length > 1 || !noThrottle;
      if (needItemDelay && j < group.length - 1) await delay(itemDelay);
    }
    if (i + size < files.length) await delay(batchDelay);
  }
}

function base64ToUint8Array(base64) {
  const binary = atob(base64);
  const out = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) out[i] = binary.charCodeAt(i);
  return out;
}

async function decodeOneImage(file) {
  const buf = await file.arrayBuffer();
  const resp = await fetch('/api/decode-image', {
    method: 'POST',
    headers: { 'Content-Type': 'image/png' },
    body: buf
  });
  const data = await parseJsonSafe(resp);
  if (!resp.ok) throw new Error((data && (data.detail || data.error)) || ('HTTP ' + resp.status));
  return { ...data, __sourceName: file.name };
}

async function decodeImagesInParallel(files, concurrency, onProgress) {
  const maxC = Math.max(1, Math.min(files.length, Number(concurrency) || 1));
  const results = new Array(files.length);
  let nextIndex = 0;
  let done = 0;

  async function runOne() {
    while (true) {
      const idx = nextIndex;
      if (idx >= files.length) return;
      nextIndex += 1;

      try {
        const decoded = await decodeOneImage(files[idx]);
        results[idx] = { ok: true, file: files[idx], decoded };
      } catch (err) {
        results[idx] = { ok: false, file: files[idx], error: err };
      }

      done += 1;
      if (typeof onProgress === 'function') onProgress(done, files.length);
    }
  }

  await Promise.all(Array.from({ length: maxC }, () => runOne()));
  return results;
}

btnGen.addEventListener('click', async () => {
  const text = txtEl.value.trim();
  if (!text) {
    showMsg('请先输入文本内容', 'error');
    txtEl.focus();
    return;
  }

  btnGen.disabled = true;
  btnGen.textContent = '处理中…';
  showMsg('正在生成，请稍候…', 'info');

  try {
    const resp = await fetch('/api/encode-text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await parseJsonSafe(resp);
    if (!resp.ok) throw new Error((data && (data.detail || data.error)) || ('HTTP ' + resp.status));

    const files = Array.isArray(data.files) ? data.files : [];
    if (!files.length) throw new Error('服务端未返回可下载文件');

    await downloadFilesInBatches(files, APP_CONFIG.DOWNLOAD_BATCH_SIZE);
    const dlModeText = APP_CONFIG.DOWNLOAD_BATCH_SIZE === 0
      ? '已取消下载节流（不分批）'
      : `已按每批 ${APP_CONFIG.DOWNLOAD_BATCH_SIZE} 张自动下载`;
    showMsg(`生成成功！共 ${files.length} 张图片，${dlModeText}`, 'success');
  } catch (err) {
    showMsg('生成失败：' + err.message, 'error');
  } finally {
    btnGen.disabled = false;
    btnGen.textContent = '生成';
  }
});

fileB64Inp.addEventListener('change', async () => {
  const file = fileB64Inp.files && fileB64Inp.files[0];
  if (!file) return;

  let progressSse = null;

  try {
    setProgressVisible(true);
    resetProgress();

    const fileName = safeFileName(file.name || 'file.bin');

    if (file.size > APP_CONFIG.MAX_UPLOAD_BYTES) {
      showMsg(`上传文件不能大于 ${formatBytesAsMb(APP_CONFIG.MAX_UPLOAD_BYTES)} MB`, 'error');
      fileB64Inp.value = '';
      return;
    }

    const fileNameB64 = utf8ToBase64(fileName);
    const taskId = createTaskId();
    const mime = file.type || 'application/octet-stream';
    showMsg(`正在上传并由服务端处理文件「${fileName}」...`, 'info');

    progressSse = openProgressSse(taskId, (evt) => {
      if (!evt || !evt.stage) return;
      if (evt.stage === 'upload') {
        setStageProgress('upload', evt.percent || 100, evt.total ? `${(evt.loaded / 1024 / 1024).toFixed(1)}/${(evt.total / 1024 / 1024).toFixed(1)} MB` : '100%');
        return;
      }
      if (evt.stage === 'process') {
        const label = (evt.current && evt.total) ? `${evt.current}/${evt.total}` : (evt.message || '处理中...');
        setStageProgress('process', evt.percent || 0, label);
        return;
      }
      if (evt.stage === 'done') {
        setStageProgress('process', 100, '100%');
        return;
      }
      if (evt.stage === 'error') {
        showMsg('生成失败：' + (evt.message || '服务端处理失败'), 'error');
      }
    });

    const body = await file.arrayBuffer();

    const data = await postArrayBufferWithUploadProgress(
      '/api/encode-file',
      {
        'Content-Type': 'application/octet-stream',
        'x-task-id': taskId,
        'x-file-name': 'file.bin',
        'x-file-name-b64': fileNameB64,
        'x-mime-type': mime
      },
      body,
      (pct, loaded, total) => {
        const mbLoaded = (loaded / 1024 / 1024).toFixed(1);
        const mbTotal = (total / 1024 / 1024).toFixed(1);
        setStageProgress('upload', pct, `${mbLoaded}/${mbTotal} MB`);
      }
    );
    setStageProgress('upload', 100, '100%');

    const files = Array.isArray(data.files) ? data.files : [];
    if (!files.length) throw new Error('服务端未返回可下载文件');

    await downloadFilesInBatches(files, APP_CONFIG.DOWNLOAD_BATCH_SIZE);
  setStageProgress('download', 100, '100%');

    const mb = (file.size / 1024 / 1024).toFixed(2);
    const dlModeText = APP_CONFIG.DOWNLOAD_BATCH_SIZE === 0
      ? '下载不节流（不分批）'
      : `下载节流为每批 ${APP_CONFIG.DOWNLOAD_BATCH_SIZE} 张`;
    showMsg(
      `文件「${fileName}」（${mb} MB）已成功转换为 ${files.length} 张图片并下载，${dlModeText}`,
      'success'
    );
  } catch (err) {
    const msg = err && err.code === 'PAYLOAD_TOO_LARGE'
      ? `上传文件不能大于 ${formatBytesAsMb(err.maxBytes || APP_CONFIG.MAX_UPLOAD_BYTES)} MB`
      : '生成失败：' + err.message;
    showMsg(msg, 'error');
  } finally {
    if (progressSse) progressSse.close();
    setTimeout(() => setProgressVisible(false), 1000);
    fileB64Inp.value = '';
  }
});

fileInp.addEventListener('change', async () => {
  const files = Array.from(fileInp.files || []);
  if (!files.length) return;

  const bad = files.find(f => f.type && f.type !== 'image/png');
  if (bad) {
    showMsg(`请上传 PNG 格式图片（文件「${bad.name}」格式不符）`, 'error');
    fileInp.value = '';
    return;
  }

  const messages = [];
  const errors = [];
  const stegResults = [];
  const stgmResults = [];
  const decodeCache = [];

  try {
    setProgressVisible(true);
    resetProgress();
    setStageProgress('upload', 100, '已上传');

    const hwCores = Number(navigator.hardwareConcurrency) || 4;
    const configured = Number(APP_CONFIG.MAX_WORKERS) || 0;
    const decodeConcurrency = Math.max(1, Math.min(files.length, configured > 0 ? configured : hwCores));
    showMsg(`正在并行解析 ${files.length} 张图片（并发 ${decodeConcurrency}）…`, 'info');

    const decodedList = await decodeImagesInParallel(files, decodeConcurrency, (done, total) => {
      setStageProgress('process', (done / total) * 55, `${done}/${total}`);
      showMsg(`正在并行解析图片… ${done}/${total}`, 'info');
    });

    for (const item of decodedList) {
      decodeCache.push(item);
      if (!item.ok) {
        errors.push(`「${item.file.name}」识别失败：${item.error.message}`);
        continue;
      }
      if (item.decoded.format === 'STEG') {
        stegResults.push(item.decoded);
      } else if (item.decoded.format === 'STGM') {
        stgmResults.push(item.decoded);
      } else {
        errors.push(`「${item.file.name}」识别失败：未知格式`);
      }
    }

    for (const r of stegResults) {
      txtEl.value = String(r.text || '');
      messages.push(`「${r.__sourceName || '图片'}」识别成功，共还原 ${Array.from(String(r.text || '')).length} 个字符`);
    }

    if (stgmResults.length) {
      const groups = {};
      for (const r of stgmResults) {
        const key = safeFileName(r.fileName || 'file.bin');
        if (!groups[key]) groups[key] = [];
        groups[key].push(r);
      }

      for (const [fileName, chunks] of Object.entries(groups)) {
        const total = Number(chunks[0].totalChunks || 0);
        if (total <= 0) {
          errors.push(`「${fileName}」组装失败：totalChunks 非法`);
          continue;
        }

        const inconsistent = chunks.find(c => Number(c.totalChunks) !== total);
        if (inconsistent) {
          errors.push(`「${fileName}」组装失败：各分片声明总片数不一致`);
          continue;
        }

        const mime = chunks[0].mime || 'application/octet-stream';
        const mimeConflict = chunks.find(c => (c.mime || 'application/octet-stream') !== mime);
        if (mimeConflict) {
          errors.push(`「${fileName}」组装失败：各分片 MIME 不一致`);
          continue;
        }

        const map = {};
        let invalid = false;
        for (const c of chunks) {
          const idx = Number(c.chunkIndex);
          if (!Number.isInteger(idx) || idx < 0 || idx >= total || map[idx]) {
            invalid = true;
            break;
          }
          map[idx] = c;
        }
        if (invalid) {
          errors.push(`「${fileName}」组装失败：分片序号非法或重复`);
          continue;
        }

        const missing = [];
        for (let i = 0; i < total; i++) if (!map[i]) missing.push(i + 1);
        if (missing.length) {
          errors.push(`「${fileName}」组装失败：缺少第 ${missing.join('、')} 片`);
          continue;
        }

        const arrays = [];
        let totalBytes = 0;
        for (let i = 0; i < total; i++) {
          const bytes = base64ToUint8Array(String(map[i].data || ''));
          arrays.push(bytes);
          totalBytes += bytes.length;
          setStageProgress('process', 55 + ((i + 1) / total) * 35, `组装 ${i + 1}/${total}`);
        }

        const merged = new Uint8Array(totalBytes);
        let offset = 0;
        for (const arr of arrays) {
          merged.set(arr, offset);
          offset += arr.length;
        }

        triggerBlobDownload(new Blob([merged], { type: mime }), fileName);
        setStageProgress('download', 100, '100%');
        messages.push(`「${fileName}」组装成功！共 ${total} 片，总 ${(totalBytes / 1024 / 1024).toFixed(2)} MB，已下载`);
      }
    }

    setStageProgress('process', 100, '100%');

    const all = messages.concat(errors);
    if (!all.length) {
      showMsg('未识别到可解码内容', 'error');
    } else {
      const hasError = errors.length > 0 || all.some(m => m.includes('失败'));
      showMsg(all.join('\n'), hasError ? 'error' : 'success');
    }
  } catch (err) {
    showMsg('识别失败：' + err.message, 'error');
  } finally {
    setTimeout(() => setProgressVisible(false), 1000);
    fileInp.value = '';
  }
});

fetchConfig()
  .then(() => {
    const dlModeText = APP_CONFIG.DOWNLOAD_BATCH_SIZE === 0
      ? ''
      : `下载节流每批 ${APP_CONFIG.DOWNLOAD_BATCH_SIZE} 张`;
    showMsg(
      `配置已加载：分片阈值 ${(APP_CONFIG.CHUNK_SIZE_BYTES / 1024 / 1024).toFixed(0)} MB，${dlModeText}`,
      'info'
    );
  })
  .catch(err => {
    showMsg('读取配置失败，已使用默认配置：' + err.message, 'error');
  });
</script>
</body>
</html>
